<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>割り勘計算</title>
<style>
  :root {
    --ink: #14161A;
    --paper: #FAFAF8;
    --mist: #F0F0EE;
    --line: #DEDDD8;
    --signal: #2F5CFF;
    --muted: #6B6B66;
    --font-body: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    --font-mono: "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-body);
    color: var(--ink);
    background: var(--paper);
    padding: 48px 40px;
  }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
    margin: 0 0 8px;
  }
  h2 {
    margin: 0 0 12px;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  p.lead {
    margin: 0 0 28px;
    color: var(--muted);
    font-size: 14px;
    max-width: 32em;
  }
  .fields {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .field label {
    display: block;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .field input {
    font-family: var(--font-body);
    font-size: 20px;
    font-weight: 700;
    padding: 10px 14px;
    border: 1px solid var(--line);
    border-radius: 4px;
    width: 180px;
    color: var(--ink);
    background: #FFFFFF;
  }
  .field input:focus {
    outline: 2px solid var(--signal);
    outline-offset: 1px;
    border-color: var(--signal);
  }
  button {
    appearance: none;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 600;
    padding: 12px 24px;
    border-radius: 4px;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
    transition: opacity 0.15s ease;
  }
  button:hover { opacity: 0.8; }
  button:active { opacity: 0.6; }
  #result {
    margin-top: 28px;
    padding: 24px 28px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #FFFFFF;
    font-size: 15px;
    line-height: 2;
  }
  #result strong {
    font-size: 20px;
    font-weight: 900;
    color: var(--signal);
  }
  .error { color: #C4402A; }
</style>
</head>
<body>
  <p class="eyebrow">Warikan</p>
  <h2>割り勘計算</h2>
  <p class="lead">合計金額と人数を入れてください。端数は幹事が多く払う想定で計算します。</p>

  <div class="fields">
    <div class="field">
      <label for="total">合計金額（円）</label>
      <input type="number" id="total" value="10000" min="0">
    </div>
    <div class="field">
      <label for="people">人数</label>
      <input type="number" id="people" value="3" min="1">
    </div>
  </div>

  <button onclick="calc()">計算する</button>
  <div id="result"></div>

  <script>
    function calc() {
      const total = Number(document.getElementById('total').value);
      const people = Number(document.getElementById('people').value);
      const el = document.getElementById('result');

      if (!Number.isFinite(total) || total < 0) {
        el.innerHTML = '<span class="error">合計金額は0以上の数字を入れてください</span>';
        return;
      }
      if (!Number.isInteger(people) || people <= 0) {
        el.innerHTML = '<span class="error">人数は1以上の整数を入れてください</span>';
        return;
      }

      const base = Math.floor(total / people);
      const remainder = total - base * people;

      el.innerHTML = `
        1人あたり：<strong>${base.toLocaleString()}円</strong><br>
        端数（幹事が追加で負担）：${remainder.toLocaleString()}円<br>
        幹事の支払い：<strong>${(base + remainder).toLocaleString()}円</strong>
      `;
    }

    calc();
  </script>
</body>
</html>
