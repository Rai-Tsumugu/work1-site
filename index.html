<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みんなのタブ ― AIを使った開発講座</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <p class="brand-mark">MINNA NO TAB</p>
        <h1 class="brand-title">みんなのタブ</h1>
        <p class="brand-sub">AIを使った開発講座 ― 参加者それぞれの機能が、1つのサイトになる</p>
      </div>
      <div class="header-meta">
        <span class="meta-count" id="tab-count">00</span>
        <span class="meta-label">tabs&nbsp;registered</span>
      </div>
    </div>
  </header>

  <main class="site-main">
    <nav id="tab-nav" class="tab-nav" aria-label="タブ一覧"></nav>

    <div class="frame-card">
      <div class="frame-statusbar">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="status-file" class="status-file">tabs/_sample.html</span>
        <span class="status-sep">·</span>
        <span id="status-author" class="status-author">by 先生</span>
      </div>
      <iframe id="tab-frame" class="tab-frame" title="機能表示エリア"></iframe>
    </div>
  </main>

  <footer class="site-footer">
    <p><code>tabs/自分の名前.html</code> を作り、<code>tabs.js</code> に1行追加すると、あなたの機能もここに並びます。</p>
  </footer>

  <script src="tabs.js"></script>
  <script>
    const nav = document.getElementById('tab-nav');
    const frame = document.getElementById('tab-frame');
    const statusFile = document.getElementById('status-file');
    const statusAuthor = document.getElementById('status-author');
    const tabCount = document.getElementById('tab-count');

    function selectTab(index) {
      const tab = TABS[index];
      frame.src = tab.file;
      statusFile.textContent = tab.file;
      statusAuthor.textContent = tab.author ? `by ${tab.author}` : '';
      document.querySelectorAll('.tab-link').forEach((el, i) => {
        el.classList.toggle('active', i === index);
        el.setAttribute('aria-current', i === index ? 'true' : 'false');
      });
    }

    TABS.forEach((tab, i) => {
      const link = document.createElement('button');
      link.type = 'button';
      link.className = 'tab-link';
      link.innerHTML = `<span class="tab-link-name">${tab.name}</span>` +
        (tab.author ? `<span class="tab-link-author">${tab.author}</span>` : '');
      link.addEventListener('click', () => selectTab(i));
      nav.appendChild(link);
    });

    tabCount.textContent = String(TABS.length).padStart(2, '0');
    if (TABS.length > 0) {
      selectTab(0);
    }
  </script>
</body>
</html>
